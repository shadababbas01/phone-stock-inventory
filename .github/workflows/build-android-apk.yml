name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "mobile-web/**"
      - "resources/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: |
          npx cap add android
          npx capacitor-assets generate --android --iconBackgroundColor '#E99524' --iconBackgroundColorDark '#0B0D0F' --splashBackgroundColor '#0B0D0F' --splashBackgroundColorDark '#0B0D0F'
          chmod +x android/gradlew

      - name: Build installable APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Name APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Mangla-Communication.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mangla-Communication-Android
          path: Mangla-Communication.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publish permanent APK download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view android-latest >/dev/null 2>&1 || gh release create android-latest --target "$GITHUB_SHA" --title "Mangla Communication Android" --notes "Installable Android APK for the live Mangla Communication phone inventory."
          gh release upload android-latest Mangla-Communication.apk --clobber
