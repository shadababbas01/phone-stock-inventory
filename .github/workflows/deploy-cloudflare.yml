name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: phone-stock-inventory-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$ADMIN_PASSWORD"

      - name: Lint and test
        run: npm run lint && npm test

      - name: Find or create production D1 database
        id: database
        shell: bash
        run: |
          DATABASE_ID="$(npx wrangler d1 list --json | node -e '
            let input = "";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const databases = JSON.parse(input);
              const match = databases.find(database => database.name === "phone-stock-inventory");
              process.stdout.write(match?.uuid || match?.id || "");
            });
          ')"
          if [ -z "$DATABASE_ID" ]; then
            DATABASE_ID="$(npx wrangler d1 create phone-stock-inventory --json | node -e '
              let input = "";
              process.stdin.on("data", chunk => input += chunk);
              process.stdin.on("end", () => {
                const database = JSON.parse(input);
                process.stdout.write(database.uuid || database.id || database.database_id || "");
              });
            ')"
          fi
          test -n "$DATABASE_ID"
          echo "database_id=$DATABASE_ID" >> "$GITHUB_OUTPUT"

      - name: Prepare deployment configuration
        env:
          D1_DATABASE_ID: ${{ steps.database.outputs.database_id }}
        run: npm run cloudflare:config

      - name: Apply database migrations
        run: npx wrangler d1 migrations apply DB --remote --config wrangler.deploy.json

      - name: Deploy application
        run: npx wrangler deploy --config wrangler.deploy.json

      - name: Install admin authentication secrets
        run: |
          node scripts/generate-cloudflare-secrets.mjs > /tmp/cloudflare-secrets.json
          npx wrangler secret bulk /tmp/cloudflare-secrets.json --config wrangler.deploy.json
          rm -f /tmp/cloudflare-secrets.json
